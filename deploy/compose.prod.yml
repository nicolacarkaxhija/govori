# One stack per instance (ADR 0029): GLOTTY_INSTANCE names the product
# this stack runs — project name, database, and both app builds follow
# it. Nothing here defaults to a particular instance.
name: ${GLOTTY_INSTANCE:?set GLOTTY_INSTANCE}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GLOTTY_INSTANCE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${GLOTTY_INSTANCE}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${GLOTTY_INSTANCE} -d ${GLOTTY_INSTANCE}']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      GLOTTY_INSTANCE: ${GLOTTY_INSTANCE}
      GLOTTY_DB__URL: postgres://${GLOTTY_INSTANCE}:${POSTGRES_PASSWORD}@db:5432/${GLOTTY_INSTANCE}
      GLOTTY_SERVER__BASE_URL: ${PUBLIC_URL:-http://localhost:8080}
      GLOTTY_SERVER__CORS_ORIGINS: ${PUBLIC_URL:-http://localhost:8080}
      GLOTTY_AUTH__SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_INSTANCE: ${GLOTTY_INSTANCE}
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - '${HTTP_PORT:-8080}:80'
      - '${HTTPS_PORT:-8443}:443'
    depends_on:
      - api
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
